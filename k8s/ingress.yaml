# An Ingress is a set of HTTP routing rules. The ingress-nginx controller reads
# this and starts routing: requests for host "scout.localhost" go to the scout
# Service. This replaces `kubectl port-forward` with a real URL.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: scout
spec:
  ingressClassName: nginx
  rules:
    - host: scout.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: scout      # forward to the scout Service...
                port:
                  number: 80     # ...on its port 80
